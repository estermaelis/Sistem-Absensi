{% extends "admin/base.html" %}

{% block title %}Edit Karyawan{% endblock %}
{% block page_title %}Edit Data Karyawan{% endblock %}
{% block breadcrumb %}Home / Kelola Karyawan / Edit{% endblock %}

{% block content %}
<div class="card">
    <h2 class="card-title">Edit Data Karyawan</h2>

    <form method="POST" action="{{ url_for('admin.edit_student', student_id=employee.id) }}">
        <div style="max-width: 600px;">
            <div class="form-group">
                <label class="form-label form-label-required">NIP</label>
                <input type="text" name="nip" value="{{ employee.nip }}" required class="form-input">
            </div>

            <div class="form-group">
                <label class="form-label form-label-required">Nama Lengkap</label>
                <input type="text" name="name" value="{{ employee.name }}" required class="form-input">
            </div>

            <div class="form-group">
                <label class="form-label">Departemen</label>
                <select name="department_id" class="form-select">
                    <option value="">-- Tidak ada --</option>
                    {% for dept in departments %}
                    <option value="{{ dept.id }}" {% if employee.department_id == dept.id %}selected{% endif %}>{{ dept.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" name="email" value="{{ employee.email or '' }}" class="form-input">
            </div>

            <div class="form-group">
                <label class="form-label form-label-required">Jenis Kelamin</label>
                <select name="gender" required class="form-select">
                    <option value="L" {% if employee.gender == 'L' %}selected{% endif %}>Laki-laki</option>
                    <option value="P" {% if employee.gender == 'P' %}selected{% endif %}>Perempuan</option>
                </select>
            </div>

            <div class="flex gap-sm mt-lg">
                <button type="submit" class="btn btn-primary">Simpan Perubahan</button>
                <a href="{{ url_for('admin.students') }}" class="btn btn-secondary">Kembali</a>
            </div>
        </div>
    </form>
</div>
{% endblock %}
