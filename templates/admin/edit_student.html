{% extends "admin/base.html" %}

{% block title %}Edit Siswa{% endblock %}
{% block page_title %}Edit Data Siswa/Karyawan{% endblock %}
{% block breadcrumb %}Home / Kelola Siswa / Edit{% endblock %}

{% block content %}
<div class="card">
    <h2 class="card-title">Edit Data Siswa</h2>

    <form method="POST" action="{{ url_for('admin.edit_student', student_id=student.id) }}">
        <div style="max-width: 600px;">
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; color: #2c3e50; font-weight: 500;">NIS/ID <span style="color: red;">*</span></label>
                <input type="text" name="nis" value="{{ student.nis }}" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px;">
            </div>

            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; color: #2c3e50; font-weight: 500;">Nama Lengkap <span style="color: red;">*</span></label>
                <input type="text" name="name" value="{{ student.name }}" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px;">
            </div>

            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; color: #2c3e50; font-weight: 500;">Kelas/Divisi</label>
                <input type="text" name="class_name" value="{{ student.class_name or '' }}" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px;">
            </div>

            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; color: #2c3e50; font-weight: 500;">Jenis Kelamin <span style="color: red;">*</span></label>
                <select name="gender" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px;">
                    <option value="L" {% if student.gender == 'L' %}selected{% endif %}>Laki-laki</option>
                    <option value="P" {% if student.gender == 'P' %}selected{% endif %}>Perempuan</option>
                </select>
            </div>

            <div style="display: flex; gap: 10px; margin-top: 30px;">
                <button type="submit" style="padding: 12px 24px; background: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; font-weight: 500;">
                    💾 Simpan Perubahan
                </button>
                <a href="{{ url_for('admin.students') }}" style="padding: 12px 24px; background: #95a5a6; color: white; border-radius: 5px; text-decoration: none; font-size: 14px; font-weight: 500; display: inline-block;">
                    ← Kembali
                </a>
            </div>
        </div>
    </form>
</div>
{% endblock %}
