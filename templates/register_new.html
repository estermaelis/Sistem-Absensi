<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Sistem Absensi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bmw-design.css') }}">
    <style>
        body {
            background: var(--color-surface-soft);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-lg);
        }
        .register-container {
            max-width: 600px;
            width: 100%;
            background: var(--color-canvas);
            border: 1px solid var(--color-hairline);
            border-radius: var(--rounded-lg);
            box-shadow: var(--shadow-card);
            padding: var(--spacing-xxl);
            animation: slide-up 0.6s ease-out;
        }
        .register-header {
            text-align: center;
            margin-bottom: var(--spacing-xl);
        }
        .register-header h1 {
            font: var(--font-display-md);
            color: var(--color-ink);
            margin-bottom: var(--spacing-sm);
        }
        .register-header p {
            font: var(--font-body-sm);
            color: var(--color-muted);
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-md);
        }
        @media (max-width: 640px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-header">
            <h1>Create Account</h1>
            <p>Join Attendify today</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('register_new') }}" id="registerForm">
            <div class="form-group">
                <label class="form-label" for="nip">NIP / Employee ID</label>
                <input type="text" id="nip" name="nip" class="form-input" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="name">Full Name</label>
                <input type="text" id="name" name="name" class="form-input" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label" for="department_id">Department</label>
                    <select id="department_id" name="department_id" class="form-select">
                        <option value="">-- None --</option>
                        {% for dept in departments %}
                        <option value="{{ dept.id }}">{{ dept.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="gender">Gender</label>
                    <select id="gender" name="gender" class="form-select" required>
                        <option value="">Select Gender</option>
                        <option value="L">Male</option>
                        <option value="P">Female</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" name="password" class="form-input" required minlength="6">
                <small style="color: var(--color-secondary); font-size: 0.75rem;">Minimum 6 characters</small>
            </div>

            <div class="form-group">
                <label class="form-label" for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" class="form-input" required>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: var(--spacing-md);">
                Create Account
            </button>
        </form>

        <div style="text-align: center; margin-top: var(--spacing-lg);">
            <p style="font-size: 0.875rem; color: var(--color-secondary);">
                Already have an account?
                <a href="{{ url_for('login') }}" style="color: var(--color-primary); font-weight: 500; text-decoration: none;">
                    Sign In
                </a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm_password').value;

            if (password !== confirmPassword) {
                e.preventDefault();
                alert('Password tidak cocok!');
                return false;
            }
        });
    </script>
</body>
</html>
