<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistem Absensi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bmw-design.css') }}">
    <style>
        body {
            background: var(--color-surface-soft);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-lg);
        }
        .login-container {
            max-width: 480px;
            width: 100%;
            background: var(--color-canvas);
            border: 1px solid var(--color-hairline);
            border-radius: var(--rounded-lg);
            box-shadow: var(--shadow-card);
            padding: var(--spacing-xxl);
            animation: slide-up 0.6s ease-out;
        }
        .login-header {
            text-align: center;
            margin-bottom: var(--spacing-xl);
        }
        .login-header h1 {
            font-family: var(--font-display);
            font-size: 2rem;
            color: var(--color-primary);
            margin-bottom: var(--spacing-sm);
        }
        .login-header p {
            font-size: 0.875rem;
            color: var(--color-secondary);
        }
        .login-footer {
            text-align: center;
            margin-top: var(--spacing-xl);
            padding-top: var(--spacing-lg);
            border-top: 1px solid var(--color-border);
        }
        .login-footer p {
            font-size: 0.875rem;
            color: var(--color-secondary);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>Welcome Back</h1>
            <p>Sign in to Attendify</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('login') }}" id="loginForm">
            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <input type="text" id="username" name="username" class="form-input" required autofocus>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" name="password" class="form-input" required>
            </div>

            <button type="submit" class="btn btn-primary" id="btnLogin" style="width: 100%;">
                Sign In
            </button>
        </form>

        <div style="text-align: center; margin-top: var(--spacing-lg);">
            <p style="font-size: 0.875rem; color: var(--color-secondary);">
                Don't have an account?
                <a href="{{ url_for('register_new') }}" style="color: var(--color-primary); font-weight: 500; text-decoration: none;">
                    Register Now
                </a>
            </p>
        </div>

        <div class="login-footer">
            <p>&copy; 2026 Attendify. All rights reserved.</p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            const btn = document.getElementById('btnLogin');
            btn.disabled = true;
            btn.textContent = 'Signing in...';
        });
    </script>
</body>
</html>
