<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sistem Absensi{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bmw-design.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="top-nav">
        <div class="nav-brand">Sistem Absensi Face Recognition</div>
        <div class="nav-menu">
            <a href="{{ url_for('index') }}" class="nav-link">Dashboard</a>
            <a href="{{ url_for('students') }}" class="nav-link">Data Siswa</a>
            <a href="{{ url_for('train') }}" class="nav-link">Training</a>
            <a href="{{ url_for('attendance') }}" class="nav-link">Absensi</a>
        </div>
    </div>

    <main style="padding: var(--spacing-xl); background: var(--color-surface-soft); min-height: calc(100vh - var(--height-nav));">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer style="background: var(--color-surface-soft); padding: var(--spacing-lg); text-align: center; border-top: 1px solid var(--color-hairline);">
        <div class="container">
            <p style="font: var(--font-body-sm); color: var(--color-muted); margin: 0;">&copy; 2026 Sistem Absensi Face Recognition</p>
        </div>
    </footer>

    {% block extra_js %}{% endblock %}
</body>
</html>
